  <!-- whatsapp bubble -->
  <circle cx="680" cy="160" r="30" fill="#22c55e"/>
  <path d="M668 160 a12 12 0 1 1 5 9.5 l-8 2.5 2.5 -7 a12 12 0 0 1 0.5 -5" fill="#0f172a"/>
  <text x="100" y="500" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff">Recibos de Sueldo</text>
