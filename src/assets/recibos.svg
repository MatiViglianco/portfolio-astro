    <rect x="545" y="165" width="50" height="55" rx="12" fill="none" stroke="#22d3ee" stroke-width="8"/>
    <rect x="520" y="210" width="100" height="80" rx="12" fill="#22d3ee"/>
    <circle cx="570" cy="245" r="10" fill="#0f172a"/>
