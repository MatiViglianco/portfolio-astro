<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <circle cx="680" cy="80" r="180" fill="#a855f7" opacity="0.08"/>
  <circle cx="80" cy="540" r="160" fill="#22c55e" opacity="0.08"/>
  <!-- chat bubble -->
  <rect x="90" y="140" width="300" height="90" rx="20" fill="#22c55e" opacity="0.9"/>
  <path d="M110 230 L95 260 L140 230 Z" fill="#22c55e" opacity="0.9"/>
  <!-- audio waveform inside bubble -->
  <g stroke="#0f172a" stroke-width="8" stroke-linecap="round">
    <line x1="140" y1="175" x2="140" y2="195"/>
    <line x1="165" y1="160" x2="165" y2="210"/>
    <line x1="190" y1="170" x2="190" y2="200"/>
    <line x1="215" y1="150" x2="215" y2="220"/>
    <line x1="240" y1="168" x2="240" y2="202"/>
    <line x1="265" y1="158" x2="265" y2="212"/>
    <line x1="290" y1="175" x2="290" y2="195"/>
    <line x1="315" y1="165" x2="315" y2="205"/>
  </g>
  <!-- AI reply bubble -->
  <rect x="410" y="290" width="300" height="120" rx="20" fill="#312e81"/>
  <path d="M690 410 L705 440 L660 410 Z" fill="#312e81"/>
  <g fill="#c4b5fd">
    <rect x="440" y="320" width="240" height="12" rx="6"/>
    <rect x="440" y="345" width="200" height="12" rx="6"/>
    <rect x="440" y="370" width="160" height="12" rx="6"/>
  </g>
  <!-- sparkle -->
  <path d="M420 250 l8 20 20 8 -20 8 -8 20 -8 -20 -20 -8 20 -8 Z" fill="#a855f7"/>
  <text x="90" y="500" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff">WhatsApp + IA</text>
  <text x="90" y="540" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#94a3b8">Transcripción · Resumen · CRM comercial</text>
  <rect x="90" y="560" width="220" height="6" rx="3" fill="url(#accent)"/>
</svg>
