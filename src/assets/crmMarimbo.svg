<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bgc)"/>
  <circle cx="700" cy="100" r="170" fill="#38bdf8" opacity="0.07"/>
  <circle cx="100" cy="520" r="150" fill="#a855f7" opacity="0.08"/>
  <!-- sidebar: channels -->
  <rect x="90" y="120" width="200" height="300" rx="14" fill="#1e293b"/>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#94a3b8">
    <circle cx="120" cy="165" r="14" fill="#22c55e"/>
    <text x="145" y="171">Clientes</text>
    <circle cx="120" cy="225" r="14" fill="#a855f7"/>
    <text x="145" y="231">Equipo</text>
    <circle cx="120" cy="285" r="14" fill="#f59e0b"/>
    <text x="145" y="291">Carta de Porte</text>
  </g>
  <g fill="#334155">
    <rect x="110" y="320" width="160" height="12" rx="6"/>
    <rect x="110" y="345" width="130" height="12" rx="6"/>
    <rect x="110" y="370" width="150" height="12" rx="6"/>
  </g>
  <!-- inbox conversation panel -->
  <rect x="320" y="120" width="390" height="300" rx="14" fill="#1e293b"/>
  <!-- incoming message -->
  <rect x="345" y="150" width="220" height="60" rx="14" fill="#334155"/>
  <g fill="#94a3b8">
    <rect x="365" y="170" width="180" height="10" rx="5"/>
    <rect x="365" y="188" width="130" height="10" rx="5"/>
  </g>
  <!-- outgoing message -->
  <rect x="465" y="230" width="220" height="60" rx="14" fill="#166534"/>
  <g fill="#86efac">
    <rect x="485" y="250" width="180" height="10" rx="5"/>
    <rect x="485" y="268" width="120" height="10" rx="5"/>
  </g>
  <!-- metrics row -->
  <g>
    <rect x="345" y="320" width="105" height="70" rx="10" fill="#312e81"/>
    <rect x="465" y="320" width="105" height="70" rx="10" fill="#312e81"/>
    <rect x="585" y="320" width="105" height="70" rx="10" fill="#312e81"/>
    <g fill="#c4b5fd" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
      <text x="370" y="365">580</text>
      <text x="490" y="365">143</text>
      <text x="627" y="365">4</text>
    </g>
  </g>
  <text x="90" y="500" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff">CRM Multi-canal</text>
  <text x="90" y="540" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#94a3b8">Inbox WhatsApp · Colas · Alertas · Reportes</text>
  <rect x="90" y="560" width="220" height="6" rx="3" fill="url(#accc)"/>
