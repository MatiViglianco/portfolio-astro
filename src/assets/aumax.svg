<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#431407"/>
    </linearGradient>
    <linearGradient id="acce" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#fb923c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bge)"/>
  <circle cx="680" cy="120" r="160" fill="#fb923c" opacity="0.07"/>
  <circle cx="110" cy="520" r="150" fill="#a855f7" opacity="0.08"/>
  <!-- truck -->
  <g>
    <rect x="100" y="220" width="220" height="100" rx="10" fill="#334155"/>
    <rect x="320" y="250" width="90" height="70" rx="8" fill="#475569"/>
    <rect x="335" y="262" width="40" height="30" rx="4" fill="#93c5fd" opacity="0.7"/>
    <circle cx="150" cy="330" r="26" fill="#1e293b" stroke="#64748b" stroke-width="6"/>
    <circle cx="240" cy="330" r="26" fill="#1e293b" stroke="#64748b" stroke-width="6"/>
    <circle cx="370" cy="330" r="26" fill="#1e293b" stroke="#64748b" stroke-width="6"/>
    <!-- grain in truck -->
    <path d="M110 220 q 50 -30 100 -12 q 60 20 100 2 l0 12 l-200 0 Z" fill="#f59e0b" opacity="0.85"/>
  </g>
  <!-- scale platform -->
  <rect x="80" y="368" width="360" height="16" rx="8" fill="#0ea5e9" opacity="0.6"/>
  <text x="130" y="420" font-family="Consolas, monospace" font-size="22" fill="#7dd3fc">28.540 kg</text>
  <!-- ticket PDF -->
  <g transform="rotate(-4 610 250)">
    <rect x="530" y="150" width="160" height="200" rx="10" fill="#f8fafc"/>
    <rect x="530" y="150" width="160" height="38" rx="10" fill="#fb923c"/>
    <text x="545" y="176" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">TICKET PDF</text>
    <g fill="#cbd5e1">
      <rect x="548" y="205" width="124" height="10" rx="5"/>
      <rect x="548" y="227" width="95" height="10" rx="5"/>
      <rect x="548" y="249" width="110" height="10" rx="5"/>
      <rect x="548" y="271" width="85" height="10" rx="5"/>
    </g>
    <text x="548" y="320" font-family="Consolas, monospace" font-size="13" fill="#475569">CTG · CPE · Pesos</text>
  </g>
  <!-- whatsapp send -->
  <circle cx="700" cy="400" r="34" fill="#22c55e"/>
  <path d="M686 400 a14 14 0 1 1 6 11 l-9 3 3 -8 a14 14 0 0 1 0 -6" fill="#0f172a"/>
  <g stroke="#22c55e" stroke-width="4" stroke-dasharray="8 8" fill="none">
    <path d="M620 330 Q 670 350 690 375"/>
  </g>
  <text x="100" y="500" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff">Tickets de Descarga</text>
  <text x="100" y="540" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#94a3b8">Balanza · ARCA/WSCPE · PDF por WhatsApp</text>
  <rect x="100" y="560" width="220" height="6" rx="3" fill="url(#acce)"/>
</svg>
